name: Upstream Sync

permissions:
  contents: write
  actions: write

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}

    steps:
      - name: Checkout target repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.MY_PAT }}
          ref: main
          fetch-depth: 0

      - name: Setup Git User
        run: |
          git config --global user.name "bbbugg"
          git config --global user.email "daming20120101@163.com"

      - name: Manual Sync upstream changes
        id: sync
        run: |
          set -e
          git remote add upstream https://github.com/ChatGPTNextWeb/ChatGPT-Next-Web.git || true
          git fetch upstream main
          git checkout main
          git merge upstream/main --no-ff -m "Action: 自动同步上游代码"
          if git diff --name-only --diff-filter=U | grep -q . ; then
            echo "Merge conflict detected in main branch. Files need manual resolution:"
            git diff --name-only --diff-filter=U
            exit 1
          fi
          git push origin main --force-with-lease=main:origin/main
